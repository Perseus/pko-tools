[env]
# Disable Kaitai code regeneration by default. The checked-in generated files
# in gen/kaitai/ are canonical. Set PKO_KAITAI_BUILD=1 explicitly to regenerate.
PKO_KAITAI_BUILD = "0"

[target.x86_64-unknown-linux-gnu]
linker = "/usr/bin/clang"
rustflags = ["-C", "link-arg=--ld-path=/usr/bin/mold"]

# Use LLD linker on Windows for faster linking
[target.x86_64-pc-windows-msvc]
linker = "lld-link"